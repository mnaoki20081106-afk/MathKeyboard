name: Build MathKeyboard IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      # プロジェクトを読み込ませてスキームを自動生成させる
      - name: List Schemes
        run: xcodebuild -list -project MathKeyboard.xcodeproj

      # 依存関係の解決
      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboardApp

      # ターゲットの依存関係を強制的に紐付ける
      - name: Inject KeyboardKit Dependency to Extension
        run: |
          sudo gem install xcodeproj
          cat << 'EOF' > fix_pbxproj.rb
          require 'xcodeproj'
          
          project_path = 'MathKeyboard.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          ext_target = project.targets.find { |t| t.name == 'MathKeyboardExtension' }
          
          if ext_target.nil?
            puts "Error: MathKeyboardExtension target not found!"
            exit 1
          end

          pkg_ref = project.root_object.package_references.find { |ref| ref.repositoryURL&.include?('KeyboardKit') }
          
          if pkg_ref.nil?
            puts "Error: KeyboardKit package reference not found in project!"
            exit 1
          end

          product_dep = ext_target.package_product_dependencies.find { |dep| dep.product_name == 'KeyboardKit' }
          
          if product_dep.nil?
            product_dep = project.new(Xcodeproj::Project::Object::XCSwiftPackageProductDependency)
            product_dep.product_name = 'KeyboardKit'
            product_dep.package = pkg_ref
            ext_target.package_product_dependencies << product_dep
          end

          frameworks_phase = ext_target.frameworks_build_phase
          unless frameworks_phase.files.any? { |f| f.product_ref == product_dep }
            build_file = project.new(Xcodeproj::Project::Object::PBXBuildFile)
            build_file.product_ref = product_dep
            frameworks_phase.files << build_file
          end

          project.save
          puts "Successfully updated MathKeyboard.xcodeproj"
          EOF
          ruby fix_pbxproj.rb

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # 署名なしでビルド
      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboardApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            build

      # .app を Payload に入れてIPA化
      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ github.workspace }}/DerivedData" -name "MathKeyboardApp.app" -type d | grep -v "Package" | head -n 1)
          echo "Found .app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Error: MathKeyboardApp.app not found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/MathKeyboardApp.app
          zip -r MathKeyboard.ipa Payload
          echo "IPA size: $(ls -lh MathKeyboard.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathKeyboard-unsigned
          path: MathKeyboard.ipa
          retention-days: 30
