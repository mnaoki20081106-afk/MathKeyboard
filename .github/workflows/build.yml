name: Build MathKeyboard IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Package Dependencies
        run: xcodebuild -resolvePackageDependencies -project MathKeyboard.xcodeproj -scheme MathKeyboard

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # 署名なしでビルド
      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboard \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            build

      # .app を Payload に入れてIPA化
      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ github.workspace }}/DerivedData" -name "MathKeyboardApp.app" -type d | grep -v "Package" | head -n 1)
          echo "Found .app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/MathKeyboardApp.app
          zip -r MathKeyboard.ipa Payload
          echo "IPA size: $(ls -lh MathKeyboard.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathKeyboard-unsigned
          path: MathKeyboard.ipa
          retention-days: 30
