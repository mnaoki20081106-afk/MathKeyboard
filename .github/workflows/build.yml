name: Build MathKeyboard IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List Schemes
        run: xcodebuild -list -project MathKeyboard.xcodeproj

      # 必要なら「リンクだけ」直す。バージョンは絶対に上書きしない
      - name: Fix Xcode Project (link KeyboardKit only)
        run: |
          sudo gem install xcodeproj
          cat << 'EOF' > fix_pbxproj.rb
          require 'xcodeproj'

          project_path = 'MathKeyboard.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          ext_target = project.targets.find { |t| t.name == 'MathKeyboardExtension' }
          abort("MathKeyboardExtension target not found") if ext_target.nil?

          pkg_ref = project.root_object.package_references.find { |ref|
            ref.repositoryURL&.downcase&.include?('keyboardkit')
          }
          abort("KeyboardKit package reference not found") if pkg_ref.nil?

          # ここでバージョンは変更しない
          product_dep = ext_target.package_product_dependencies.find { |dep|
            dep.product_name == 'KeyboardKit'
          }

          if product_dep.nil?
            product_dep = project.new(Xcodeproj::Project::Object::XCSwiftPackageProductDependency)
            product_dep.product_name = 'KeyboardKit'
            product_dep.package = pkg_ref
            ext_target.package_product_dependencies << product_dep
          end

          frameworks_phase = ext_target.frameworks_build_phase
          unless frameworks_phase.files.any? { |f| f.product_ref == product_dep }
            build_file = project.new(Xcodeproj::Project::Object::PBXBuildFile)
            build_file.product_ref = product_dep
            frameworks_phase.files << build_file
          end

          project.save
          puts "Successfully updated MathKeyboard.xcodeproj without changing package version"
          EOF
          ruby fix_pbxproj.rb

      # Package.resolved は消さない
      # 代わりにキャッシュを軽く掃除
      - name: Clear stale SPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm || true
          rm -rf ~/Library/org.swift.swiftpm || true
          rm -rf "${{ github.workspace }}/DerivedData" || true

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboardApp

      # まずは cache を外して安定確認した方が安全
      # 必要なら後で戻す

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboardApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ github.workspace }}/DerivedData" -name "MathKeyboardApp.app" -type d | grep -v "Package" | head -n 1)
          echo "Found .app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Error: MathKeyboardApp.app not found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/MathKeyboardApp.app
          zip -r MathKeyboard.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathKeyboard-unsigned
          path: MathKeyboard.ipa
          retention-days: 30
